<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuzbAI Arena — Competition Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: hsl(255, 85%, 75%);
            --primary-glow: hsla(255, 85%, 75%, 0.3);
            --bg: hsl(225, 25%, 3%);
            --card-bg: hsla(225, 25%, 10%, 0.7);
            --card-border: hsla(0, 0%, 100%, 0.08);
            --text: hsl(210, 20%, 98%);
            --text-muted: hsl(215, 15%, 65%);
            --accent: hsl(335, 80%, 65%);
            --success: hsl(155, 65%, 50%);
            --warning: hsl(35, 85%, 60%);
            --glass: hsla(225, 25%, 3%, 0.9);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(244, 63, 94, 0.1) 0px, transparent 50%);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.5;
        }

        h1, h2, h3 {
            font-family: 'Outfit', sans-serif;
        }

        /* --- Components --- */

        .glass-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--card-border);
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 40px;
            justify-content: space-between;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 10px;
        }

        .nav-tab {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 10px 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .nav-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .main-container {
            margin-top: 90px;
            padding: 20px 40px;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .glass-card.disabled {
            opacity: 0.5;
            filter: grayscale(0.8);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
        }

        .status-dot.active {
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* --- Specific Content Styling --- */

        .metric-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .metric {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 10px;
            transition: box-shadow 0.4s ease;
        }

        .score-box-active {
            box-shadow: 0 0 0 2px hsl(155, 65%, 50%);
        }

        .score-box-inactive {
            box-shadow: 0 0 0 2px hsl(0, 75%, 55%);
        }

        .metric-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .metric-value {
            font-size: 14px;
            font-weight: 600;
        }

        .action-bar {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 15px 25px;
            display: flex;
            gap: 15px;
            align-items: center;
            margin-top: 20px;
        }

        /* --- Buttons --- */

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .btn-primary {
            background: var(--primary);
            border: none;
        }

        .btn-primary:hover {
            background: #4f46e5;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .btn-accent {
            background: var(--accent);
            border: none;
        }

        .btn-accent:hover {
            background: #e11d48;
        }

        /* --- Results Hub --- */

        .results-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
        }

        .results-table th {
            text-align: left;
            padding: 10px;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 500;
        }

        .results-table td {
            background: rgba(255, 255, 255, 0.02);
            padding: 15px 10px;
        }

        .results-table tr td:first-child { border-radius: 10px 0 0 10px; }
        .results-table tr td:last-child { border-radius: 0 10px 10px 0; }

        .pairing-select {
            background: #1e293b;
            border: 1px solid var(--card-border);
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            width: 100%;
            outline: none;
        }

        .pairing-select:focus {
            border-color: var(--primary);
        }

        .conflict {
            border-color: var(--accent) !important;
            background: rgba(244, 63, 94, 0.1) !important;
        }

        /* --- Side Panel --- */

        .side-panel {
            position: sticky;
            top: 90px;
            height: calc(100vh - 110px);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .scroll-list {
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 5px;
        }

        .scroll-list::-webkit-scrollbar { width: 4px; }
        .scroll-list::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 2px; }

        /* --- Standings Matrix --- */
        .matrix-container {
            overflow-x: auto;
            background: rgba(255, 255, 255, 0.01);
            border-radius: 12px;
            padding: 15px;
        }

        .matrix-table {
            border-collapse: collapse;
            font-size: 11px;
            width: 100%;
            color: var(--text-muted);
        }

        .matrix-table td, .matrix-table th {
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 8px;
            text-align: center;
        }

        .matrix-score {
            color: var(--text);
            font-weight: 600;
            cursor: pointer;
        }
        
        .matrix-score:hover {
            color: var(--primary);
        }

        .matrix-win { background: hsla(155, 65%, 50%, 0.15) !important; color: hsl(155, 100%, 75%) !important; }
        .matrix-draw { background: hsla(35, 85%, 60%, 0.15) !important; color: hsl(35, 100%, 80%) !important; }
        .matrix-loss { background: hsla(335, 80%, 65%, 0.15) !important; color: hsl(335, 100%, 85%) !important; }

        /* --- Modals --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal {
            background: var(--bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 30px;
            width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            background: #1e293b;
            border: 1px solid var(--card-border);
            color: white;
            padding: 10px;
            border-radius: 8px;
            outline: none;
        }
    </style>
</head>
<body>

    <header class="glass-header">
        <div class="logo-area">
            <div class="logo-text">FUZBAI ARENA</div>
        </div>
        <div class="nav-links">
            <button class="nav-tab active" onclick="showView('sims')">Simulators</button>
            <button class="nav-tab" onclick="showView('teams')">Teams</button>
            <button class="nav-tab" onclick="showView('results')">Results</button>
            <button class="nav-tab" onclick="showView('debug')">Debug</button>
        </div>
        <div style="display: flex; gap: 10px; align-items: center;">
            <a href="/tournament" style="color: var(--text-muted); text-decoration: none; font-size: 0.85rem; padding: 6px 12px; border: 1px solid var(--card-border); border-radius: 8px; transition: all 0.2s;">Turnir</a>
            <a href="/viz-control" style="color: var(--text-muted); text-decoration: none; font-size: 0.85rem; padding: 6px 12px; border: 1px solid var(--card-border); border-radius: 8px; transition: all 0.2s;">Vizualizacija</a>
            <button class="btn" onclick="saveConfig()">Save Config</button>
            <button class="btn" onclick="loadConfig()">Reload Config</button>
        </div>
    </header>

    <main class="main-container" id="view-sims" style="display: grid;">
        <div class="content-area">
            <h2 class="section-title">Results Matrix</h2>
            <div class="glass-card" style="margin-bottom: 20px; padding: 10px;">
                <div class="matrix-container" id="results-matrix-sims"></div>
            </div>
            
            <h2 class="section-title">Match Arena</h2>
            <div class="card-grid" id="simulators-grid"></div>

            <div class="action-bar">
                <button class="btn btn-accent" onclick="globalReset()">Reset All</button>
                <button class="btn btn-primary" onclick="globalControl('start')">Start All</button>
                <button class="btn" onclick="globalControl('pause')">Pause All</button>
                <div style="flex-grow: 1"></div>
                <button class="btn btn-primary" onclick="autoAssign()">Auto-Assign Pairings</button>
                <button class="btn" onclick="resetAllPairings()">Reset Pairings</button>
                <button class="btn btn-success" onclick="storeAndReset()">Store & Reset</button>
            </div>
        </div>
        <div class="side-panel">
            <h2 class="section-title">Quick Standings</h2>
            <div class="glass-card scroll-list" id="mini-standings"></div>
        </div>
    </main>

    <main class="main-container" id="view-teams" style="display: none; grid-template-columns: 1fr;">
        <div class="content-area">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 class="section-title" style="margin-bottom: 0;">Team Ecosystem</h2>
                <button class="btn btn-primary" onclick="showAddTeam()">+ Add Team</button>
            </div>
            <div class="card-grid" id="teams-grid"></div>
        </div>
    </main>

    <main class="main-container" id="view-results" style="display: none; grid-template-columns: 1fr 450px;">
        <div class="content-area">
            <h2 class="section-title">Match History</h2>
            <div class="glass-card" style="padding: 0;">
                <table class="results-table" id="match-history-table">
                    <thead>
                        <tr>
                            <th>DATE</th>
                            <th>RED TEAM</th>
                            <th>BLUE TEAM</th>
                            <th>SCORE</th>
                            <th>TIME</th>
                            <th>ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody id="match-history-body"></tbody>
                </table>
            </div>
            
            <h2 class="section-title" style="margin-top: 40px;">Ranked Standings</h2>
            <div class="glass-card">
                <table class="results-table" id="standings-table">
                    <thead>
                        <tr>
                            <th>POS</th>
                            <th>TEAM</th>
                            <th>P</th>
                            <th>W</th>
                            <th>D</th>
                            <th>L</th>
                            <th>GD</th>
                            <th>PTS</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
        <div class="side-panel">
            <h2 class="section-title">Results Matrix</h2>
            <div class="glass-card scroll-list">
                <div class="matrix-container" id="results-matrix"></div>
            </div>
            <div class="glass-card">
                <button class="btn btn-accent" style="width: 100%; justify-content: center;" onclick="clearAllResults()">Clear All Results</button>
            </div>
        </div>
    </main>

    <main class="main-container" id="view-debug" style="display: none; grid-template-columns: 1fr;">
        <div class="content-area" style="max-width: 600px; margin: 0 auto;">
            <h2 class="section-title">Manual Result Entry (Debug)</h2>
            <div class="glass-card" style="padding: 30px;">
                <div style="display: grid; gap: 20px;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div>
                            <label class="metric-label">RED TEAM</label>
                            <select id="debug-red" class="pairing-select"></select>
                        </div>
                        <div>
                            <label class="metric-label">BLUE TEAM</label>
                            <select id="debug-blue" class="pairing-select"></select>
                        </div>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div>
                            <label class="metric-label">RED SCORE</label>
                            <input type="number" id="debug-score-red" class="pairing-select" value="0">
                        </div>
                        <div>
                            <label class="metric-label">BLUE SCORE</label>
                            <input type="number" id="debug-score-blue" class="pairing-select" value="0">
                        </div>
                    </div>
                    <div>
                        <label class="metric-label">GAME TIME (S)</label>
                        <input type="number" id="debug-time" class="pairing-select" value="300">
                    </div>
                    <button class="btn btn-accent" onclick="submitDebugResult()" style="padding: 15px; font-weight: bold; width: 100%; justify-content: center;">INSERT TEST RESULT</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal: Edit Score -->
    <div class="modal-overlay" id="score-modal">
        <div class="modal">
            <h3>Edit Game Result</h3>
            <p id="modal-match-desc" style="margin-bottom: 20px; color: var(--text-muted); font-size: 14px;"></p>
            <input type="hidden" id="modal-result-id">
            <div class="input-group">
                <label>Red Score</label>
                <input type="number" id="modal-score-red">
            </div>
            <div class="input-group">
                <label>Blue Score</label>
                <input type="number" id="modal-score-blue">
            </div>
            <div style="display: flex; gap: 10px; margin-top: 30px;">
                <button class="btn btn-primary" style="flex: 1; justify-content: center;" onclick="submitScoreEdit()">Save Changes</button>
                <button class="btn" style="flex: 1; justify-content: center;" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Modal: Add Team -->
    <div class="modal-overlay" id="add-team-modal">
        <div class="modal">
            <h3>Add New Team</h3>
            <br>
            <div class="input-group">
                <label>Team ID</label>
                <input type="number" id="add-team-id">
            </div>
            <div class="input-group">
                <label>Team Name</label>
                <input type="text" id="add-team-name">
            </div>
            <div class="input-group">
                <label>Proxy Port</label>
                <input type="number" id="add-team-port">
            </div>
            <div style="display: flex; gap: 10px; margin-top: 30px;">
                <button class="btn btn-primary" style="flex: 1; justify-content: center;" onclick="submitAddTeam()">Add Team</button>
                <button class="btn" style="flex: 1; justify-content: center;" onclick="closeAddTeam()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let teams = [];
        let sims = [];
        let results = [];
        let activeMatches = {};

        async function api(path, method = 'GET', body = null) {
            const options = { method };
            if (body) {
                options.headers = { 'Content-Type': 'application/json' };
                options.body = JSON.stringify(body);
            }
            const res = await fetch(path, options);
            if (!res.ok) {
                console.error(`API Error: ${path}`, await res.text());
                return null;
            }
            return res.json();
        }

        async function refresh() {
            const [tData, sData, stData, rData, amData] = await Promise.all([
                api('/api/teams'),
                api('/api/simulators'),
                api('/api/results/standings'),
                api('/api/results'),
                api('/api/matches/active')
            ]);

            if (tData) teams = tData;
            if (sData) sims = sData;
            if (rData) results = rData;
            if (amData) activeMatches = amData;

            renderTeams();
            renderSimulators();
            renderStandings(stData);
            renderMiniStandings(stData);
            renderMatrix();
            renderMatchHistory();
            checkConflicts();
            updateDebugSelects();
        }

        function showView(viewId) {
            document.querySelectorAll('.main-container').forEach(v => v.style.display = 'none');
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            
            const view = document.getElementById('view-' + viewId);
            if (viewId === 'teams' || viewId === 'debug') {
                view.style.display = 'block';
            } else {
                view.style.display = 'grid';
            }
            
            const tab = document.querySelector(`.nav-tab[onclick*="'${viewId}'"]`);
            if (tab) tab.classList.add('active');
            
            refresh();
        }

        function renderTeams() {
            const grid = document.getElementById('teams-grid');
            
            teams.forEach(t => {
                const isActive = t.stats && t.stats.idle_seconds !== null && t.stats.idle_seconds < 10;
                let card = document.getElementById(`team-card-${t.id}`);
                if (!card) {
                    card = document.createElement('div');
                    card.id = `team-card-${t.id}`;
                    card.className = 'glass-card';
                    grid.appendChild(card);
                    
                    card.innerHTML = `
                        <div class="card-header">
                            <h3 style="font-size: 1rem;" class="team-name"></h3>
                            <div class="status-dot"></div>
                        </div>
                        <div class="metric-group">
                            <div class="metric">
                                <div class="metric-label">PORT</div>
                                <div class="metric-value proxy-port"></div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">IDLE</div>
                                <div class="metric-value idle-time">--s</div>
                            </div>
                        </div>
                        <div class="metric-group">
                            <div class="metric">
                                <div class="metric-label">REQ/S</div>
                                <div class="metric-value req-rate">0.0 /s</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">CONNS</div>
                                <div class="metric-value conns-active">0</div>
                            </div>
                        </div>
                        <div style="display: flex; gap: 8px;">
                            <button class="btn btn-toggle" style="flex: 1; font-size: 11px;"></button>
                            <button class="btn btn-accent btn-delete" style="padding: 8px;">×</button>
                        </div>
                    `;
                }

                card.classList.toggle('disabled', !t.enabled);
                card.querySelector('.team-name').innerText = `${t.name} (T${t.id})`;
                card.querySelector('.status-dot').classList.toggle('active', isActive);
                card.querySelector('.proxy-port').innerText = t.proxy_port;
                card.querySelector('.idle-time').innerText = (t.stats?.idle_seconds?.toFixed(1) || '--') + 's';
                card.querySelector('.req-rate').innerText = (t.stats?.requests_per_second?.toFixed(1) ?? '0.0') + ' /s';
                card.querySelector('.conns-active').innerText = t.stats?.connections_active || 0;
                
                const toggleBtn = card.querySelector('.btn-toggle');
                toggleBtn.innerText = t.enabled ? 'Disable' : 'Enable';
                toggleBtn.setAttribute('onclick', `toggleTeam(${t.id}, ${!t.enabled})`);
                
                card.querySelector('.btn-delete').setAttribute('onclick', `deleteTeam(${t.id})`);
            });

            // Remove cards for teams that no longer exist
            Array.from(grid.children).forEach(child => {
                const id = parseInt(child.id.split('-').pop());
                if (!teams.find(t => t.id === id)) {
                    grid.removeChild(child);
                }
            });
        }

        function updateDebugSelects() {
            const debugRed = document.getElementById('debug-red');
            const debugBlue = document.getElementById('debug-blue');
            if (!debugRed || !debugBlue) return;
            
            const currentRed = debugRed.value;
            const currentBlue = debugBlue.value;
            
            const optionsHtml = `<option value="-1">None</option>` + 
                teams.map(t => `<option value="${t.id}">${t.name} (T${t.id})</option>`).join('');
            
            debugRed.innerHTML = optionsHtml;
            debugBlue.innerHTML = optionsHtml;
            
            debugRed.value = currentRed || "-1";
            debugBlue.value = currentBlue || "-1";
        }

        function updateSimulatorsGrid(simStatuses) {
            const grid = document.getElementById('simulators-grid');
            sims.forEach((s, idx) => {
                const status = simStatuses[idx] || { status: 'offline' };
                const isOnline = status.status !== 'offline';
                const score = status.score || [0, 0];
                const time = status.gametime || 0;

                let card = document.getElementById(`sim-card-${s.id}`);
                if (!card) {
                    card = document.createElement('div');
                    card.id = `sim-card-${s.id}`;
                    card.className = 'glass-card';
                    grid.appendChild(card);
                    
                    card.innerHTML = `
                        <div class="card-header">
                            <h3 style="font-size: 1rem;">Simulator ${s.id}</h3>
                            <div style="display: flex; gap: 8px; align-items: center;">
                                <button class="btn btn-toggle" style="padding: 4px 8px; font-size: 10px;"></button>
                                <div class="status-dot"></div>
                            </div>
                        </div>
                        <div class="metric-group">
                            <div class="metric score-metric-red" style="background: rgba(100,0,0,0.1)">
                                <div class="metric-label metric-label-red">RED</div>
                                <div class="metric-value score-red" style="font-size: 20px;">0</div>
                            </div>
                            <div class="metric score-metric-blue" style="background: rgba(0,0,100,0.1)">
                                <div class="metric-label metric-label-blue">BLUE</div>
                                <div class="metric-value score-blue" style="font-size: 20px;">0</div>
                            </div>
                        </div>
                        <div class="metric" style="margin-bottom: 12px;">
                            <div class="metric-label">GAME TIME</div>
                            <div class="metric-value game-time">0.0s</div>
                        </div>
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px;">
                            <div>
                                <div class="metric-label">RED TEAM</div>
                                <select class="pairing-select sim-red" data-sim="${s.id}" onchange="assignMatch(${s.id})">
                                    <option value="-1">None</option>
                                </select>
                            </div>
                            <div>
                                <div class="metric-label">BLUE TEAM</div>
                                <select class="pairing-select sim-blue" data-sim="${s.id}" onchange="assignMatch(${s.id})">
                                    <option value="-1">None</option>
                                </select>
                            </div>
                        </div>

                        <div style="display: flex; gap: 6px;">
                            <button class="btn btn-primary btn-start" style="flex: 1; padding: 6px;" onclick="simControl(${s.id}, 'start')">START</button>
                            <button class="btn btn-reset" style="flex: 1; padding: 6px;" onclick="simControl(${s.id}, 'reset')">RESET</button>
                            <button class="btn btn-accent btn-save" style="flex: 1.2; padding: 6px;" onclick="saveMatch(${s.id})">SAVE</button>
                        </div>
                    `;
                }

                card.classList.toggle('disabled', !s.enabled);
                const dot = card.querySelector('.status-dot');
                dot.classList.toggle('active', isOnline);
                card.querySelector('.score-red').innerText = score[0];
                card.querySelector('.score-blue').innerText = score[1];
                card.querySelector('.game-time').innerText = time.toFixed(1) + 's';
                const toggleBtn = card.querySelector('.btn-toggle');
                toggleBtn.innerText = s.enabled ? 'Off' : 'On';
                toggleBtn.setAttribute('onclick', `toggleSim(${s.id}, ${!s.enabled})`);
                const redSelect = card.querySelector('.sim-red');
                const blueSelect = card.querySelector('.sim-blue');
                const enabledTeams = teams.filter(t => t.enabled);
                const currentOptions = Array.from(redSelect.options).map(o => o.value).join(',');
                const newOptions = ["-1", ...enabledTeams.map(t => t.id.toString())].join(',');
                if (currentOptions !== newOptions) {
                    const redVal = redSelect.value;
                    const blueVal = blueSelect.value;
                    const optionsHtml = `<option value="-1">None</option>` + 
                        enabledTeams.map(t => `<option value="${t.id}">${t.name} (T${t.id})</option>`).join('');
                    redSelect.innerHTML = optionsHtml;
                    blueSelect.innerHTML = optionsHtml;
                    redSelect.value = redVal;
                    blueSelect.value = blueVal;
                }
                redSelect.disabled = !s.enabled;
                blueSelect.disabled = !s.enabled;
                card.querySelector('.btn-start').disabled = !s.enabled;
                card.querySelector('.btn-reset').disabled = !s.enabled;
                card.querySelector('.btn-save').disabled = !s.enabled;
                
                // Set pairing from active match if it exists & Update Labels
                const activeMatch = activeMatches[s.id];
                if (activeMatch) {
                    redSelect.value = activeMatch.red_team_id;
                    blueSelect.value = activeMatch.blue_team_id;
                } else if (redSelect.value !== "-1" && blueSelect.value !== "-1") {
                    // Reset if both were previously set but are no longer in activeMatches
                    redSelect.value = "-1";
                    blueSelect.value = "-1";
                }
                
                const curRedId = parseInt(redSelect.value);
                const curBlueId = parseInt(blueSelect.value);
                const rTeam = teams.find(t => t.id === curRedId);
                const bTeam = teams.find(t => t.id === curBlueId);
                
                card.querySelector('.metric-label-red').innerText = `RED${rTeam ? ': ' + rTeam.name : ''}`;
                card.querySelector('.metric-label-blue').innerText = `BLUE${bTeam ? ': ' + bTeam.name : ''}`;

                // Score box border: green = active (req/s > 0), red = assigned but silent
                const redMetric = card.querySelector('.score-metric-red');
                const blueMetric = card.querySelector('.score-metric-blue');
                if (rTeam) {
                    const rRate = rTeam.stats?.requests_per_second ?? 0;
                    redMetric.classList.toggle('score-box-active', rRate > 0);
                    redMetric.classList.toggle('score-box-inactive', rRate === 0);
                } else {
                    redMetric.classList.remove('score-box-active', 'score-box-inactive');
                }
                if (bTeam) {
                    const bRate = bTeam.stats?.requests_per_second ?? 0;
                    blueMetric.classList.toggle('score-box-active', bRate > 0);
                    blueMetric.classList.toggle('score-box-inactive', bRate === 0);
                } else {
                    blueMetric.classList.remove('score-box-active', 'score-box-inactive');
                }
            });

            Array.from(grid.children).forEach(child => {
                const id = parseInt(child.id.split('-').pop());
                if (!sims.find(si => si.id === id)) grid.removeChild(child);
            });
        }

        async function renderSimulators() {
            const simStatuses = await Promise.all(sims.map(s => api(`/api/simulators/${s.id}/status`)));
            updateSimulatorsGrid(simStatuses);
        }

        function renderMiniStandings(standings) {
            if (!standings) return;
            const container = document.getElementById('mini-standings');
            container.innerHTML = `
                <table class="results-table" style="font-size: 11px;">
                    <thead><tr><th>TEAM</th><th>P</th><th>PTS</th></tr></thead>
                    <tbody>
                        ${standings.slice(0, 8).map(s => `
                            <tr>
                                <td style="font-weight: 600">${s.name}</td>
                                <td>${s.duels_played}</td>
                                <td style="color: var(--primary); font-weight: 700">${s.pts}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function renderMatchHistory() {
            const tbody = document.getElementById('match-history-body');
            tbody.innerHTML = results.map(r => `
                <tr>
                    <td style="font-size: 11px; color: var(--text-muted)">${new Date(r.created_at).toLocaleString()}</td>
                    <td style="color: #fca5a5">${r.red_team_name}</td>
                    <td style="color: #93c5fd">${r.blue_team_name}</td>
                    <td style="font-weight: 700">${r.score_red} : ${r.score_blue}</td>
                    <td>${r.game_time.toFixed(1)}s</td>
                    <td>
                        <button class="btn" style="padding: 4px 8px; font-size: 10px;" onclick="editScore(${r.id}, '${r.red_team_name}', '${r.blue_team_name}', ${r.score_red}, ${r.score_blue})">Edit</button>
                    </td>
                </tr>
            `).join('');
        }

        function renderStandings(standings) {
            if (!standings) return;
            const tbody = document.querySelector('#standings-table tbody');
            tbody.innerHTML = standings.map((s, i) => `
                <tr>
                    <td>${i + 1}</td>
                    <td style="font-weight: 600">${s.name}</td>
                    <td>${s.duels_played}</td>
                    <td>${s.wins}</td>
                    <td>${s.draws}</td>
                    <td>${s.losses}</td>
                    <td>${s.goal_diff}</td>
                    <td style="color: var(--primary); font-weight: 700">${s.pts}</td>
                </tr>
            `).join('');
        }

        function renderMatrix() {
            const containers = [
                document.getElementById('results-matrix'),
                document.getElementById('results-matrix-sims')
            ].filter(c => c !== null);
            
            if (teams.length === 0 || containers.length === 0) return;

            let html = `<table class="matrix-table">`;
            html += `<tr><th></th>${teams.map(t => `<th>T${t.id}</th>`).join('')}</tr>`;

            for (let rTeam of teams) {
                html += `<tr><th title="${rTeam.name}">T${rTeam.id}</th>`;
                for (let cTeam of teams) {
                    if (rTeam.id === cTeam.id) {
                        html += `<td style="background: rgba(255,255,255,0.05)"></td>`;
                    } else {
                        const match = results.find(m => m.red_team_id === rTeam.id && m.blue_team_id === cTeam.id);
                        if (match) {
                            let resClass = 'matrix-draw';
                            if (match.score_red > match.score_blue) resClass = 'matrix-win';
                            if (match.score_red < match.score_blue) resClass = 'matrix-loss';
                            
                            html += `<td class="matrix-score ${resClass}" onclick="editScore(${match.id}, '${match.red_team_name}', '${match.blue_team_name}', ${match.score_red}, ${match.score_blue})">${match.score_red}:${match.score_blue}</td>`;
                        } else {
                            html += `<td>-</td>`;
                        }
                    }
                }
                html += `</tr>`;
            }
            html += `</table>`;
            
            containers.forEach(c => c.innerHTML = html);
        }

        // --- Interaction Handlers ---

        async function toggleSim(id, enabled) {
            const sim = sims.find(s => s.id === id);
            if (sim) {
                sim.enabled = enabled;
                renderSimulators();
            }
            await api(`/api/simulators/${id}/enable?enabled=${enabled}`, 'POST');
            // refresh(); // Periodic refresh will handle final consistency
        }

        async function toggleTeam(id, enabled) {
            const team = teams.find(t => t.id === id);
            if (team) {
                team.enabled = enabled;
                renderTeams();
            }
            await api(`/api/teams/${id}/enable?enabled=${enabled}`, 'POST');
            // refresh();
        }

        async function deleteTeam(id) {
            if (confirm(`Delete team ${id}?`)) {
                await api(`/api/teams/${id}`, 'DELETE');
                refresh();
            }
        }

        function showAddTeam() {
            document.getElementById('add-team-modal').style.display = 'flex';
        }

        function closeAddTeam() {
            document.getElementById('add-team-modal').style.display = 'none';
        }

        async function submitAddTeam() {
            const id = parseInt(document.getElementById('add-team-id').value);
            const name = document.getElementById('add-team-name').value;
            const port = parseInt(document.getElementById('add-team-port').value);
            await api('/api/teams', 'POST', { id, name, proxy_port: port });
            closeAddTeam();
            refresh();
        }

        async function assignMatch(simId) {
            const red = parseInt(document.querySelector(`select.sim-red[data-sim="${simId}"]`).value);
            const blue = parseInt(document.querySelector(`select.sim-blue[data-sim="${simId}"]`).value);
            
            if (red !== -1 && blue !== -1) {
                api('/api/matches/assign', 'POST', { sim_id: simId, red_team_id: red, blue_team_id: blue });
            }
            checkConflicts();
        }

        async function autoAssign() {
            const res = await api('/api/matches/auto-assign', 'POST');
            if (res) {
                if (res.status === 'ok') {
                    alert(`Assigned ${res.assigned} matches.`);
                } else if (res.status === 'no_available_sims') {
                    alert('No simulators available for assignment.');
                } else if (res.status === 'all_played') {
                    alert('All possible pairings have already been played.');
                }
                refresh();
            }
        }

        function checkConflicts() {
            const selects = document.querySelectorAll('.pairing-select');
            const used = new Set();
            const conflicts = new Set();

            selects.forEach(s => {
                const val = s.value;
                if (val !== "-1") {
                    if (used.has(val)) conflicts.add(val);
                    used.add(val);
                }
            });

            selects.forEach(s => {
                const val = s.value;
                if (val !== "-1" && conflicts.has(val)) {
                    s.classList.add('conflict');
                } else {
                    s.classList.remove('conflict');
                }
            });
        }

        async function simControl(simId, cmd) {
            api(`/api/simulators/${simId}/control?command=${cmd}`, 'POST');
        }

        async function saveMatch(simId) {
            await api(`/api/matches/save-results?sim_id=${simId}`, 'POST');
            refresh();
        }

        async function globalControl(cmd) {
            await Promise.all(sims.filter(s => s.enabled).map(s => simControl(s.id, cmd)));
        }

        async function globalReset() {
            const res = await api('/api/matches/active-count');
            if (res && res.count > 0) {
                if (!confirm(`There are ${res.count} active matches that haven't been saved. Reset anyway?`)) return;
            }
            await globalControl('reset');
        }

        async function storeAndReset() {
            // 1. Try to save all active matches
            const activeSimIds = sims.filter(s => s.enabled).map(s => s.id);
            for (let id of activeSimIds) {
                try {
                    await api(`/api/matches/save-results?sim_id=${id}`, 'POST');
                } catch(e) { /* ignore if no active match */ }
            }
            
            // 2. Reset all simulators
            await globalControl('reset');
            refresh();
        }

        async function resetAllPairings() {
            if (confirm("Clear all team assignments from simulators?")) {
                await api('/api/matches/clear-all', 'POST');
                refresh();
            }
        }

        async function clearAllResults() {
            if (confirm("Permanently clear ALL results?")) {
                await api('/api/results/clear-all', 'POST');
                refresh();
            }
        }

        function editScore(id, rName, bName, rScore, bScore) {
            document.getElementById('modal-result-id').value = id;
            document.getElementById('modal-match-desc').innerText = `${rName} vs ${bName}`;
            document.getElementById('modal-score-red').value = rScore;
            document.getElementById('modal-score-blue').value = bScore;
            document.getElementById('score-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('score-modal').style.display = 'none';
        }

        async function submitScoreEdit() {
            const id = document.getElementById('modal-result-id').value;
            const rs = document.getElementById('modal-score-red').value;
            const bs = document.getElementById('modal-score-blue').value;
            await api(`/api/results/${id}?score_red=${rs}&score_blue=${bs}`, 'PUT');
            closeModal();
            refresh();
        }

        async function submitDebugResult() {
            const rId = parseInt(document.getElementById('debug-red').value);
            const bId = parseInt(document.getElementById('debug-blue').value);
            if (rId === -1 || bId === -1 || rId === bId) {
                alert("Select two different teams");
                return;
            }
            const rTeam = teams.find(t => t.id === rId);
            const bTeam = teams.find(t => t.id === bId);
            const rs = parseInt(document.getElementById('debug-score-red').value);
            const bs = parseInt(document.getElementById('debug-score-blue').value);
            const time = parseFloat(document.getElementById('debug-time').value);

            await api('/api/results', 'POST', {
                red_team_id: rId,
                blue_team_id: bId,
                red_team_name: rTeam.name,
                blue_team_name: bTeam.name,
                score_red: rs,
                score_blue: bs,
                game_time: time
            });
            
            alert("Result inserted");
            refresh();
            showView('results');
        }

        async function saveConfig() { await api('/api/config/save', 'POST'); alert("Config Saved"); }
        async function loadConfig() { await api('/api/config/load', 'POST'); refresh(); }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // --- Init ---
        setInterval(refresh, 1000);
        refresh();

    </script>
</body>
</html>
